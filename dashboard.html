<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>출고 정산 대시보드 | 출고정산시스템</title>
  <!-- 기본 폰트: Noto Sans KR (400/500/700) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap">
  <link rel="stylesheet" href="resourcc/css/common.css">
  <link rel="stylesheet" href="resourcc/css/dashboard.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <nav class="nav">
        <a class="nav-item" href="index.html" data-page="category">카테고리 및 단가 설정</a>
        <a class="nav-item is-active" href="dashboard.html" data-page="dashboard">출고 정산 대시보드</a>
        <a class="nav-item" href="report.html" data-page="report">출고 보고서</a>
        <a class="nav-item" href="statement.html" data-page="statement">거래처 정산서</a>
      </nav>
    </aside>

    <main class="main">
      <header class="page-head">
        <h1 class="page-title">출고 정산 대시보드</h1>
        <div class="head-actions">
          <button type="button" class="btn btn-backup" id="dataExportBtn"><span class="btn-backup__ic">↓</span> 데이터 내보내기</button>
          <button type="button" class="btn btn-backup" id="dataImportBtn"><span class="btn-backup__ic">↑</span> 데이터 가져오기</button>
          <div class="admin-chip">
            <span class="admin-chip__badge">관리자</span>
            <span class="admin-chip__name">Admin 최고관리자</span>
          </div>
        </div>
      </header>

      <!-- 브랜드 탭: JS 렌더 -->
      <div class="brand-tabs" id="brandTabs"></div>

      <!-- 드롭존 -->
      <div class="dropzone" id="dropzone">
        <p class="dropzone__title">주문서 파일을 드래그 앤 드롭해서 첨부하세요.</p>
        <p class="dropzone__sub">(파일 업로드 시 하단 시트에 실시간으로 데이터 누적)</p>
        <input type="file" id="fileInput" accept=".xlsx,.xls" multiple hidden>
      </div>

      <!-- 미매칭 항목 -->
      <section class="card unmatched" id="unmatchedPanel" hidden>
        <div class="card-head">
          <h2 class="card-title">미매칭 항목 <span class="unmatched__count" id="unmatchedCount"></span></h2>
        </div>
        <div id="unmatchedList"></div>
      </section>

      <!-- 기간 검색 -->
      <div class="filterbar">
        <div class="filterbar__left">
          <input type="date" class="date-input" id="startDate">
          <span class="tilde">~</span>
          <input type="date" class="date-input" id="endDate">
          <button type="button" class="btn btn-search" id="searchBtn">검색</button>
          <div class="chips" id="quickChips">
            <button type="button" class="chip" data-quick="thisMonth">이번달</button>
            <button type="button" class="chip" data-quick="lastMonth">지난달</button>
            <button type="button" class="chip" data-quick="last3">최근 3개월</button>
            <button type="button" class="chip" data-quick="thisYear">올해 전체</button>
            <label class="chip chip--month" data-quick="month">
              직접 월 선택 ▾
              <input type="month" id="monthPicker">
            </label>
          </div>
        </div>
        <button type="button" class="btn btn-excel" id="exportBtn">Excel 추출</button>
      </div>

      <section class="card">
        <div class="result-head">
          <strong class="result-range" id="resultRange"></strong>
          <span class="result-count" id="resultCount"></span>
        </div>
        <!-- 정산 시트: JS 렌더 -->
        <div class="table-wrap" id="tableWrap"></div>
      </section>
    </main>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <!-- 주문 삭제 확인 모달 -->
  <div class="modal" id="delModal" hidden>
    <div class="modal__backdrop" data-modal-close></div>
    <div class="modal__dialog" role="dialog" aria-modal="true" aria-labelledby="delModalTitle">
      <h3 class="modal__title" id="delModalTitle">주문 리스트 삭제</h3>
      <p class="modal__target" id="delModalTarget"></p>
      <p class="modal__desc">해당 주문 리스트를 삭제하시겠습니까? 이 작업은 되돌릴 수 없습니다.</p>
      <div class="modal__actions">
        <button type="button" class="btn modal__cancel" data-modal-close>취소</button>
        <button type="button" class="btn modal__delete" id="delModalConfirm">삭제</button>
      </div>
    </div>
  </div>

  <!-- 주문서 파싱: SheetJS 유지 / 서식 추출: ExcelJS -->
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/exceljs@4/dist/exceljs.min.js"></script>
  <script src="resourcc/js/settlement-core.js"></script>
  <script src="resourcc/js/dashboard.js"></script>
</body>
</html>
