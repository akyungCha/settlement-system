<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>거래처 정산서 | 출고정산시스템</title>
  <!-- 기본 폰트: Noto Sans KR (400/500/700) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap">
  <link rel="stylesheet" href="resourcc/css/common.css">
  <link rel="stylesheet" href="resourcc/css/statement.css">
</head>
<body class="page-statement">
  <div class="layout">
    <!-- 글로벌 네이비 사이드바 -->
    <aside class="sidebar">
      <nav class="nav">
        <a class="nav-item" href="index.html" data-page="category">카테고리 및 단가 설정</a>
        <a class="nav-item" href="dashboard.html" data-page="dashboard">출고 정산 대시보드</a>
        <a class="nav-item" href="report.html" data-page="report">출고 보고서</a>
        <a class="nav-item is-active" href="statement.html" data-page="statement">거래처 정산서</a>
      </nav>
    </aside>

    <main class="main">
      <header class="page-head">
        <h1 class="page-title">거래처 정산서</h1>
        <div class="head-actions">
          <button type="button" class="btn btn-backup" id="dataExportBtn"><span class="btn-backup__ic">↓</span> 데이터 내보내기</button>
          <button type="button" class="btn btn-backup" id="dataImportBtn"><span class="btn-backup__ic">↑</span> 데이터 가져오기</button>
          <div class="admin-chip">
            <span class="admin-chip__badge">관리자</span>
            <span class="admin-chip__name">Admin 최고관리자</span>
          </div>
        </div>
      </header>

      <!-- 콘텐츠 2컬럼: 내부 좌측 패널 + 보고서 캔버스 -->
      <div class="stmt-layout">
        <!-- 내부 좌측: 거래처 & 보고서 폴더 트리 -->
        <aside class="stmt-side">
          <div class="stmt-side__head">
            <h2 class="stmt-side__title">거래처 &amp; 보고서</h2>
            <button type="button" class="btn stmt-add-partner" id="addPartnerBtn">+ 거래처 추가</button>
          </div>
          <div class="folder-tree" id="folderTree"></div>
        </aside>

        <!-- 우측: A4 보고서 캔버스 -->
        <section class="stmt-canvas" id="canvas"></section>
      </div>
    </main>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <!-- 정산 데이터 불러오기 모달 -->
  <div class="modal" id="loadModal" hidden>
    <div class="modal__backdrop" data-load-close></div>
    <div class="modal__dialog load-modal__dialog" role="dialog" aria-modal="true" aria-labelledby="loadModalTitle">
      <h3 class="modal__title" id="loadModalTitle">정산 데이터 불러오기</h3>
      <p class="modal__sub" id="loadModalTarget"></p>
      <div class="load-body" id="loadBody"></div>
      <div class="modal__actions">
        <button type="button" class="btn modal__cancel" data-load-close>취소</button>
        <button type="button" class="btn modal__confirm" id="loadConfirm">삽입</button>
      </div>
    </div>
  </div>

  <script src="resourcc/js/settlement-core.js"></script>
  <script src="resourcc/js/statement.js"></script>
</body>
</html>
