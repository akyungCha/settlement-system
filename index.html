<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>카테고리 및 단가 설정 | 출고정산시스템</title>
  <!-- 기본 폰트: Noto Sans KR (400/500/700) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap">
  <link rel="stylesheet" href="resourcc/css/common.css">
  <link rel="stylesheet" href="resourcc/css/index.css">
</head>
<body>
  <div class="layout">
    <!-- 좌측 사이드바 -->
    <aside class="sidebar">
      <nav class="nav">
        <a class="nav-item is-active" href="index.html" data-page="category">카테고리 및 단가 설정</a>
        <a class="nav-item" href="dashboard.html" data-page="dashboard">출고 정산 대시보드</a>
        <a class="nav-item" href="report.html" data-page="report">출고 보고서</a>
        <a class="nav-item" href="statement.html" data-page="statement">거래처 정산서</a>
      </nav>
    </aside>

    <main class="main">
      <header class="page-head">
        <h1 class="page-title">카테고리 및 단가 설정</h1>
        <div class="head-actions">
          <button type="button" class="btn btn-backup" id="dataExportBtn"><span class="btn-backup__ic">↓</span> 데이터 내보내기</button>
          <button type="button" class="btn btn-backup" id="dataImportBtn"><span class="btn-backup__ic">↑</span> 데이터 가져오기</button>
          <div class="admin-chip">
            <span class="admin-chip__badge">관리자</span>
            <span class="admin-chip__name">Admin 최고관리자</span>
          </div>
        </div>
      </header>

      <!-- 브랜드 탭: JS 렌더 -->
      <div class="brand-tabs" id="brandTabs"></div>

      <section class="card">
        <div class="card-head">
          <h2 class="card-title">출고 정산 시트 양식 setting</h2>
          <button type="button" class="btn btn-save" id="saveBtn">변경사항 저장</button>
        </div>
        <!-- 카테고리 트리: JS 렌더 -->
        <div class="card-body" id="categoryArea"></div>
      </section>
    </main>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <!-- 공용 저장소 어댑터(주문/정산서 래퍼) → 백업/복원에서 사용 -->
  <script src="resourcc/js/settlement-core.js"></script>
  <script src="resourcc/js/index.js"></script>
</body>
</html>
